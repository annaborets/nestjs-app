services:
  nestjs-app:
    image: ${IMAGE_TAG}
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3000']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
