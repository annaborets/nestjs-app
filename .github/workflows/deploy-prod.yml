name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Full image tag from stage build (e.g., ghcr.io/annaborets/nestjs-app:sha-a1b2c3d)'
        required: true
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest

    environment:
      name: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify image exists
        run: |
          docker pull ${{ inputs.image_tag }}
          echo "Image verified: ${{ inputs.image_tag }}"

      - name: Deploy to production
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          echo "============================================"
          echo "Deploying to PRODUCTION"
          echo "  Commit:  ${{ github.sha }}"
          echo "  Image:   ${IMAGE_TAG}"
          echo "  Env:     production"
          echo "  Actor:   ${{ github.actor }}"
          echo "============================================"
          docker compose -f compose.prod.yml up -d

      - name: Smoke test (health check)
        run: |
          echo "Waiting for app to start..."
          sleep 10

          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/ || true)
            echo "Attempt ${i}: HTTP ${STATUS}"
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "201" ]; then
              echo "Production deployment healthy!"
              exit 0
            fi
            sleep 5
          done

          echo "Production smoke test FAILED"
          docker compose -f compose.prod.yml logs
          exit 1

      - name: Deployment summary
        run: |
          echo "## Production Deploy Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** ${{ inputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
