services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-appuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-apppassword}
      POSTGRES_DB: ${DB_NAME:-appdb}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U ${DB_USER:-appuser} -d ${DB_NAME:-appdb}']
      interval: 5s
      timeout: 3s
      retries: 5
    mem_limit: 256m
    cpus: 0.25
    stop_grace_period: 10s

  migrate:
    build:
      context: .
      target: prod
    command: ['node', 'dist/database/run-migrations.js']
    environment:
      DATABASE_URL: postgres://${DB_USER:-appuser}:${DB_PASSWORD:-apppassword}@postgres:5432/${DB_NAME:-appdb}
      DATABASE_SSL: 'false'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    profiles:
      - tools

  seed:
    build:
      context: .
      target: prod
    command: ['node', 'dist/database/seed-runner.js']
    environment:
      DATABASE_URL: postgres://${DB_USER:-appuser}:${DB_PASSWORD:-apppassword}@postgres:5432/${DB_NAME:-appdb}
      DATABASE_SSL: 'false'
      JWT_SECRET: ${JWT_SECRET:-changeme}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    profiles:
      - tools

  api:
    build:
      context: .
      target: prod-distroless
    ports:
      - '8080:3000'
    environment:
      DATABASE_URL: postgres://${DB_USER:-appuser}:${DB_PASSWORD:-apppassword}@postgres:5432/${DB_NAME:-appdb}
      DATABASE_SSL: 'false'
      JWT_SECRET: ${JWT_SECRET:-changeme}
      PORT: '3000'
      NODE_ENV: production
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-lesson9-files-private}
      S3_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
      - public
    init: true
    mem_limit: 512m
    cpus: 0.5
    stop_grace_period: 10s

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - '9002:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    networks:
      - internal

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    restart: 'no'
    networks:
      - internal
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${AWS_ACCESS_KEY_ID:-minioadmin} ${AWS_SECRET_ACCESS_KEY:-minioadmin}; do
        echo 'waiting for minio...';
        sleep 2;
      done;
      mc mb --ignore-existing local/${AWS_S3_BUCKET:-lesson9-files-private};
      mc anonymous set none local/${AWS_S3_BUCKET:-lesson9-files-private};
      echo 'minio bucket is ready';
      "

  adminer:
    image: adminer:latest
    ports:
      - '8081:8080'
    networks:
      - internal
      - public
    depends_on:
      - postgres
    profiles:
      - tools

volumes:
  pgdata:
  minio_data:

networks:
  internal:
    internal: true
  public: