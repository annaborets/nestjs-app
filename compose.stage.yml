services:
  nestjs-app:
    image: ${IMAGE_TAG}
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=staging
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s